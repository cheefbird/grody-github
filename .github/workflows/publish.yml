name: Publish to Stores

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run"
        type: boolean
        default: true
      stores:
        description: "Which store(s)?"
        type: choice
        options:
          - all
          - chrome
          - firefox
          - edge
        default: all
      chrome-submit-for-review:
        description: "Submit Chrome for review"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            TAG=$(gh release view --repo "$REPO" --json tagName -q .tagName)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-chrome:
    needs: resolve-tag
    if: >-
      github.event_name == 'release' ||
      inputs.stores == 'chrome' ||
      inputs.stores == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: chrome-store
    concurrency:
      group: publish-chrome
      cancel-in-progress: false
    steps:
      - name: Download Chrome zip
        run: |
          mkdir -p .output
          gh release download "$RELEASE_TAG" \
            --repo "$REPO" \
            --pattern "*-chrome.zip" \
            --dir .output
        env:
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate download
        id: chrome-zip
        run: |
          files=( .output/*-chrome.zip )
          if [ ${#files[@]} -ne 1 ] || [ ! -f "${files[0]}" ]; then
            echo "::error::Expected exactly 1 chrome zip, found: ${files[*]}"
            ls -la .output/
            exit 1
          fi
          echo "path=${files[0]}" >> "$GITHUB_OUTPUT"
          echo "Found: ${files[0]}"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Submit to Chrome Web Store
        run: |
          npx wxt submit \
            --chrome-zip "$CHROME_ZIP" \
            $DRY_RUN_FLAG
        env:
          CHROME_ZIP: ${{ steps.chrome-zip.outputs.path }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_SKIP_SUBMIT_REVIEW: ${{ inputs.chrome-submit-for-review == true && 'false' || 'true' }}
          DRY_RUN_FLAG: ${{ inputs.dry-run == true && '--dry-run' || '' }}

  publish-firefox:
    needs: resolve-tag
    if: >-
      github.event_name == 'release' ||
      inputs.stores == 'firefox' ||
      inputs.stores == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: firefox-store
    concurrency:
      group: publish-firefox
      cancel-in-progress: false
    steps:
      - name: Download Firefox zips
        run: |
          mkdir -p .output
          gh release download "$RELEASE_TAG" \
            --repo "$REPO" \
            --pattern "*-firefox.zip" \
            --pattern "*-sources.zip" \
            --dir .output
        env:
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate downloads
        id: firefox-zips
        run: |
          ff_files=( .output/*-firefox.zip )
          src_files=( .output/*-sources.zip )
          if [ ${#ff_files[@]} -ne 1 ] || [ ! -f "${ff_files[0]}" ]; then
            echo "::error::Expected exactly 1 firefox zip, found: ${ff_files[*]}"
            ls -la .output/
            exit 1
          fi
          if [ ${#src_files[@]} -ne 1 ] || [ ! -f "${src_files[0]}" ]; then
            echo "::error::Expected exactly 1 sources zip, found: ${src_files[*]}"
            ls -la .output/
            exit 1
          fi
          echo "firefox-path=${ff_files[0]}" >> "$GITHUB_OUTPUT"
          echo "sources-path=${src_files[0]}" >> "$GITHUB_OUTPUT"
          echo "Found: ${ff_files[0]} ${src_files[0]}"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Submit to Firefox Add-ons
        run: |
          npx wxt submit \
            --firefox-zip "$FIREFOX_ZIP" \
            --firefox-sources-zip "$SOURCES_ZIP" \
            $DRY_RUN_FLAG
        env:
          FIREFOX_ZIP: ${{ steps.firefox-zips.outputs.firefox-path }}
          SOURCES_ZIP: ${{ steps.firefox-zips.outputs.sources-path }}
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
          DRY_RUN_FLAG: ${{ inputs.dry-run == true && '--dry-run' || '' }}

  publish-edge:
    needs: resolve-tag
    if: >-
      github.event_name == 'release' ||
      inputs.stores == 'edge' ||
      inputs.stores == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: edge-store
    concurrency:
      group: publish-edge
      cancel-in-progress: false
    steps:
      - name: Download Edge zip
        run: |
          mkdir -p .output
          gh release download "$RELEASE_TAG" \
            --repo "$REPO" \
            --pattern "*-edge.zip" \
            --dir .output
        env:
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate download
        id: edge-zip
        run: |
          files=( .output/*-edge.zip )
          if [ ${#files[@]} -ne 1 ] || [ ! -f "${files[0]}" ]; then
            echo "::error::Expected exactly 1 edge zip, found: ${files[*]}"
            ls -la .output/
            exit 1
          fi
          echo "path=${files[0]}" >> "$GITHUB_OUTPUT"
          echo "Found: ${files[0]}"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Submit to Edge Add-ons
        run: |
          npx wxt submit \
            --edge-zip "$EDGE_ZIP" \
            $DRY_RUN_FLAG
        env:
          EDGE_ZIP: ${{ steps.edge-zip.outputs.path }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          DRY_RUN_FLAG: ${{ inputs.dry-run == true && '--dry-run' || '' }}
