name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag is on main
        run: git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2

      - name: Run Biome CI check
        run: biome ci .

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: "3"

      - name: Run tests
        run: pnpm test

      - name: Type check
        run: pnpm check

      - name: Build Chrome zip
        run: pnpm zip

      - name: Build Firefox zip
        run: pnpm zip:firefox

      - name: Build Edge zip
        run: pnpm zip:edge

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          generate_release_notes: true
          files: |
            .output/*-chrome.zip
            .output/*-firefox.zip
            .output/*-edge.zip
            .output/*-sources.zip
